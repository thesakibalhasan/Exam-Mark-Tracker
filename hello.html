<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="description" content="Exam Marks Tracker - Track, analyze and visualize your exam performance">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ExamTrack">
<link rel="manifest" href="manifest.json">
<title>ExamTrack — Academic Performance Tracker</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Iconify -->
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>

<!-- Chart.js + plugins -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAR0t1nIwMEhu5g2XeOHCSy9tlnfzaP5P8",
    authDomain: "sakib-exammark.firebaseapp.com",
    projectId: "sakib-exammark",
    storageBucket: "sakib-exammark.firebasestorage.app",
    messagingSenderId: "77923054030",
    appId: "1:77923054030:web:df6392584dc348d1f5bb9f",

  window._fsDoc = doc;

  window.dispatchEvent(new Event('firebaseReady'));
</script>

<style>
:root {
  --bg: #0b0d12;
  --bg2: #10131a;
  --bg3: #161923;
  --bg4: #1c2130;
  --border: #252c3d;
  --border2: #2e3649;
  --text: #e8ecf4;
  --text2: #8b96b0;
  --text3: #5a6480;
  --accent: #4f8ef7;
  --accent2: #6fa8ff;
  --green: #22c55e;
  --green2: #16a34a;
  --red: #ef4444;
  --red2: #dc2626;
  --yellow: #eab308;
  --purple: #a855f7;
  --cyan: #06b6d4;

  --physics: #4f8ef7;
  --chemistry: #a855f7;
  --biology: #22c55e;
  --hmath: #f97316;
  --gmath: #06b6d4;

  --font-display: 'DM Serif Display', serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;

  --r: 8px;
  --r2: 12px;
  --r3: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow2: 0 2px 8px rgba(0,0,0,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.6;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.3;
  pointer-events: none;
  z-index: 0;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11,13,18,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 16px;
}

.logo-text {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.5px;
}

.logo-text span { color: var(--accent2); }

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s;
}
.status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }

.status-label {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
}

/* Main layout */
.main {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* Subject tabs */
.subject-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.subject-tabs::-webkit-scrollbar { display: none; }

.subject-tab {
  flex-shrink: 0;
  padding: 8px 18px;
  border-radius: var(--r2);
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.subject-tab:hover {
  border-color: var(--border2);
  color: var(--text);
  background: var(--bg3);
}

.subject-tab.active {
  color: white;
  border-color: transparent;
  font-weight: 600;
}

.subject-tab[data-subject="physics"].active { background: var(--physics); }
.subject-tab[data-subject="chemistry"].active { background: var(--chemistry); }
.subject-tab[data-subject="biology"].active { background: var(--biology); }
.subject-tab[data-subject="hmath"].active { background: var(--hmath); }
.subject-tab[data-subject="gmath"].active { background: var(--gmath); }

/* Subject panel */
.subject-panel { display: none; }
.subject-panel.active { display: block; }

/* Category tabs */
.category-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 4px;
  margin-bottom: 20px;
  width: fit-content;
}

.category-tab {
  padding: 7px 20px;
  border-radius: var(--r);
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 7px;
}

.category-tab:hover { color: var(--text); }
.category-tab.active {
  background: var(--bg4);
  color: var(--text);
  border: 1px solid var(--border2);
  font-weight: 600;
}

.category-panel { display: none; }
.category-panel.active { display: block; }

/* Grid */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

@media (max-width: 900px) {
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 600px) {
  .grid-3 { grid-template-columns: 1fr; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
  .header { padding: 0 14px; }
  .main { padding: 16px 14px; }
}

/* Card */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 20px;
  transition: border-color 0.2s;
}

.card:hover { border-color: var(--border2); }

.card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.card-value {
  font-family: var(--font-display);
  font-size: 32px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}

.card-sub {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
}

/* Stats cards */
.stat-change {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-family: var(--font-mono);
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 8px;
}

.stat-change.up { background: rgba(34,197,94,0.12); color: var(--green); }
.stat-change.down { background: rgba(239,68,68,0.12); color: var(--red); }
.stat-change.neutral { background: rgba(139,150,176,0.12); color: var(--text2); }

/* Form */
.form-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 22px;
  margin-bottom: 20px;
}

.form-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 12px;
  align-items: end;
}

@media (max-width: 700px) {
  .form-row { grid-template-columns: 1fr 1fr; }
  .form-row .btn-add { grid-column: 1 / -1; }
}

.form-group { display: flex; flex-direction: column; gap: 6px; }

.form-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.form-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 13px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
  width: 100%;
}

.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
}

.form-input::placeholder { color: var(--text3); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--r);
  border: none;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-danger {
  background: rgba(239,68,68,0.12);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.2);
}
.btn-danger:hover { background: rgba(239,68,68,0.2); }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

.btn-add { height: 38px; }

/* Table */
.table-wrapper {
  overflow-x: auto;
  border-radius: var(--r2);
  border: 1px solid var(--border);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead th {
  background: var(--bg3);
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }

tbody td {
  padding: 10px 14px;
  color: var(--text);
  vertical-align: middle;
}

.exam-name {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent2);
  font-weight: 500;
}

.pct-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 4px;
}

.pct-badge.high { background: rgba(34,197,94,0.12); color: var(--green); }
.pct-badge.mid { background: rgba(234,179,8,0.12); color: var(--yellow); }
.pct-badge.low { background: rgba(239,68,68,0.12); color: var(--red); }

/* Progress bar */
.progress-bar-wrap {
  width: 100%;
  background: var(--bg3);
  border-radius: 3px;
  height: 6px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.16,1,0.3,1), background 0.3s;
}

.progress-bar-fill.up { background: var(--green); }
.progress-bar-fill.down { background: var(--red); }
.progress-bar-fill.neutral { background: var(--accent); }

/* Chart section */
.chart-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 20px;
  margin-bottom: 20px;
}

.chart-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.chart-type-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
.chart-type-select:focus { border-color: var(--accent); }

.chart-container {
  position: relative;
  height: 300px;
}

.chart-hint {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-top: 8px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
}

.empty-state iconify-icon {
  font-size: 40px;
  display: block;
  margin: 0 auto 14px;
  opacity: 0.4;
}

.empty-state p {
  font-size: 14px;
  line-height: 1.5;
}

/* Trend arrow */
.trend-up { color: var(--green); }
.trend-down { color: var(--red); }
.trend-neutral { color: var(--text3); }

/* Analysis grid */
.analysis-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 20px;
  margin-bottom: 20px;
}

.analysis-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.analysis-row:last-child { border-bottom: none; }
.analysis-label { color: var(--text2); }
.analysis-value { font-family: var(--font-mono); color: var(--text); font-weight: 500; }

/* Toast */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  padding: 12px 18px;
  color: var(--text);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
  max-width: 300px;
}

.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--accent); }

@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; transform: translateY(10px); }
}

/* Loading spinner */
.loader {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Section header */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Install banner */
.install-banner {
  background: linear-gradient(135deg, rgba(79,142,247,0.1), rgba(168,85,247,0.1));
  border: 1px solid rgba(79,142,247,0.25);
  border-radius: var(--r3);
  padding: 14px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  flex-wrap: wrap;
}

.install-banner p {
  font-size: 13px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

/* Subject color bar */
.subject-bar {
  height: 3px;
  border-radius: 2px;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <iconify-icon icon="fluent:data-trending-24-filled" width="18"></iconify-icon>
    </div>
    <span class="logo-text">Exam<span>Track</span></span>
  </div>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-label" id="statusLabel">Connecting...</span>
  </div>
</header>

<div class="main">

  <!-- Install PWA Banner -->
  <div class="install-banner" id="installBanner" style="display:none">
    <p>
      <iconify-icon icon="fluent:phone-add-24-regular" width="18"></iconify-icon>
      Install ExamTrack on your device for offline access and app-like experience.
    </p>
    <button class="btn btn-primary" id="installBtn" style="padding:7px 14px;font-size:12px">
      <iconify-icon icon="fluent:arrow-download-24-regular" width="14"></iconify-icon>
      Install App
    </button>
  </div>

  <!-- Subject Tabs -->
  <div class="subject-tabs" id="subjectTabs">
    <button class="subject-tab active" data-subject="physics">
      <iconify-icon icon="fluent:molecule-24-regular" width="15"></iconify-icon>
      Physics
    </button>
    <button class="subject-tab" data-subject="chemistry">
      <iconify-icon icon="fluent:beaker-24-regular" width="15"></iconify-icon>
      Chemistry
    </button>
    <button class="subject-tab" data-subject="biology">
      <iconify-icon icon="fluent:leaf-one-24-regular" width="15"></iconify-icon>
      Biology
    </button>
    <button class="subject-tab" data-subject="hmath">
      <iconify-icon icon="fluent:calculator-24-regular" width="15"></iconify-icon>
      Higher Math
    </button>
    <button class="subject-tab" data-subject="gmath">
      <iconify-icon icon="fluent:math-symbols-24-regular" width="15"></iconify-icon>
      General Math
    </button>
  </div>

  <!-- Subject Panels -->
  <div id="subjectPanels">
    <!-- Generated dynamically -->
  </div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== CONFIG ====================
const SUBJECTS = [
  { key: 'physics',   label: 'Physics',      icon: 'fluent:molecule-24-regular',       color: '#4f8ef7' },
  { key: 'chemistry', label: 'Chemistry',    icon: 'fluent:beaker-24-regular',          color: '#a855f7' },
  { key: 'biology',   label: 'Biology',      icon: 'fluent:leaf-one-24-regular',        color: '#22c55e' },
  { key: 'hmath',     label: 'Higher Math',  icon: 'fluent:calculator-24-regular',      color: '#f97316' },
  { key: 'gmath',     label: 'General Math', icon: 'fluent:math-symbols-24-regular',    color: '#06b6d4' },
];

const CATEGORIES = [
  { key: 'mcq',      label: 'MCQ',                    icon: 'fluent:checkbox-checked-24-regular' },
  { key: 'creative', label: 'Creative / Written',     icon: 'fluent:document-text-24-regular' },
];

const CHART_TYPES = [
  { value: 'line',         label: 'Line Chart' },
  { value: 'bar',          label: 'Bar Chart' },
  { value: 'area',         label: 'Area Chart' },
  { value: 'pie',          label: 'Pie Chart' },
  { value: 'doughnut',     label: 'Doughnut Chart' },
  { value: 'radar',        label: 'Radar Chart' },
  { value: 'scatter',      label: 'Scatter Plot' },
  { value: 'bubble',       label: 'Bubble Chart' },
  { value: 'stackedBar',   label: 'Stacked Bar Chart' },
  { value: 'mixed',        label: 'Mixed Chart' },
];

// ==================== STATE ====================
let allData = {}; // { 'physics_mcq': [{id, total, obtained, date, examNo}], ... }
let charts = {};  // { 'physics_mcq': ChartInstance }

function stateKey(subject, category) { return `${subject}_${category}`; }
function getData(subject, category) { return allData[stateKey(subject, category)] || []; }
function setData(subject, category, arr) { allData[stateKey(subject, category)] = arr; }

// ==================== TOAST ====================
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: 'fluent:checkmark-circle-24-filled', error: 'fluent:dismiss-circle-24-filled', info: 'fluent:info-24-filled' };
  el.innerHTML = `<iconify-icon icon="${icons[type]}" width="16"></iconify-icon>${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ==================== FIREBASE ====================
let db, fsCollection, fsAddDoc, fsGetDocs, fsDeleteDoc, fsDoc;

window.addEventListener('firebaseReady', async () => {
  db = window._db;
  fsCollection = window._fsCollection;
  fsAddDoc = window._fsAddDoc;
  fsGetDocs = window._fsGetDocs;
  fsDeleteDoc = window._fsDeleteDoc;
  fsDoc = window._fsDoc;

  document.getElementById('statusDot').classList.add('online');
  document.getElementById('statusLabel').textContent = 'Connected';

  await loadAllData();
  renderAllPanels();
  toast('Data loaded successfully', 'success');
});

async function saveEntry(subject, category, entry) {
  try {
    const colRef = fsCollection(db, `exams_${subject}_${category}`);
    const docRef = await fsAddDoc(colRef, entry);
    return docRef.id;
  } catch(e) {
    toast('Failed to save: ' + e.message, 'error');
    return null;
  }
}

async function deleteEntry(subject, category, id) {
  try {
    await fsDeleteDoc(fsDoc(db, `exams_${subject}_${category}`, id));
    return true;
  } catch(e) {
    toast('Failed to delete: ' + e.message, 'error');
    return false;
  }
}

async function loadAllData() {
  for (const s of SUBJECTS) {
    for (const c of CATEGORIES) {
      try {
        const colRef = fsCollection(db, `exams_${s.key}_${c.key}`);
        const snap = await fsGetDocs(colRef);
        const arr = [];
        snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
        arr.sort((a, b) => a.examNo - b.examNo);
        setData(s.key, c.key, arr);
      } catch(e) {
        setData(s.key, c.key, []);
      }
    }
  }
}

// ==================== RENDER ====================
function renderAllPanels() {
  const container = document.getElementById('subjectPanels');
  container.innerHTML = '';
  for (const subject of SUBJECTS) {
    const panel = document.createElement('div');
    panel.className = 'subject-panel' + (subject.key === 'physics' ? ' active' : '');
    panel.id = `panel_${subject.key}`;
    panel.innerHTML = renderSubjectPanel(subject);
    container.appendChild(panel);
  }
  // Init first subject
  initSubjectEvents('physics', 'mcq');
  initSubjectEvents('physics', 'creative');
}

function renderSubjectPanel(subject) {
  const catTabs = CATEGORIES.map((c, i) => `
    <button class="category-tab ${i === 0 ? 'active' : ''}"
      data-subject="${subject.key}" data-category="${c.key}"
      onclick="switchCategory('${subject.key}','${c.key}')">
      <iconify-icon icon="${c.icon}" width="14"></iconify-icon>
      ${c.label}
    </button>
  `).join('');

  const catPanels = CATEGORIES.map((c, i) => `
    <div class="category-panel ${i === 0 ? 'active' : ''}" id="catpanel_${subject.key}_${c.key}">
      ${renderCategoryPanel(subject, c)}
    </div>
  `).join('');

  return `
    <div class="subject-bar" style="background:${subject.color}"></div>
    <div class="category-tabs">${catTabs}</div>
    <div id="catpanels_${subject.key}">${catPanels}</div>
  `;
}

function renderCategoryPanel(subject, category) {
  const data = getData(subject.key, category.key);
  return `
    ${renderStatsCards(subject, category, data)}
    ${renderForm(subject, category)}
    ${renderAnalysis(subject, category, data)}
    ${renderChart(subject, category)}
    ${renderTable(subject, category, data)}
  `;
}

function renderStatsCards(subject, category, data) {
  if (data.length === 0) {
    return `<div class="grid-4" id="stats_${subject.key}_${category.key}">
      ${['Total Exams','Best Score','Average %','Latest %'].map(t => `
        <div class="card">
          <div class="card-title">${t}</div>
          <div class="card-value" style="font-size:22px;color:var(--text3)">--</div>
        </div>`).join('')}
    </div>`;
  }

  const pcts = data.map(d => d.obtained / d.total * 100);
  const best = Math.max(...pcts);
  const avg = pcts.reduce((a,b)=>a+b,0)/pcts.length;
  const latest = pcts[pcts.length-1];
  const prev = pcts.length > 1 ? pcts[pcts.length-2] : null;
  const diff = prev !== null ? (latest - prev).toFixed(1) : null;
  const changeHTML = diff !== null
    ? `<span class="stat-change ${parseFloat(diff)>0?'up':parseFloat(diff)<0?'down':'neutral'}">
        <iconify-icon icon="fluent:arrow-${parseFloat(diff)>=0?'up':'down'}-12-filled" width="11"></iconify-icon>
        ${Math.abs(diff)}% vs prev
       </span>`
    : '';

  return `<div class="grid-4" id="stats_${subject.key}_${category.key}">
    <div class="card">
      <div class="card-title"><iconify-icon icon="fluent:document-multiple-24-regular" width="13"></iconify-icon>Total Exams</div>
      <div class="card-value">${data.length}</div>
      <div class="card-sub">records</div>
    </div>
    <div class="card">
      <div class="card-title"><iconify-icon icon="fluent:trophy-24-regular" width="13"></iconify-icon>Best Score</div>
      <div class="card-value">${best.toFixed(1)}<span style="font-size:16px;color:var(--text3)">%</span></div>
      <div class="card-sub">highest percentage</div>
    </div>
    <div class="card">
      <div class="card-title"><iconify-icon icon="fluent:data-bar-horizontal-24-regular" width="13"></iconify-icon>Average</div>
      <div class="card-value">${avg.toFixed(1)}<span style="font-size:16px;color:var(--text3)">%</span></div>
      <div class="card-sub">mean percentage</div>
    </div>
    <div class="card">
      <div class="card-title"><iconify-icon icon="fluent:clock-24-regular" width="13"></iconify-icon>Latest</div>
      <div class="card-value">${latest.toFixed(1)}<span style="font-size:16px;color:var(--text3)">%</span></div>
      ${changeHTML}
    </div>
  </div>`;
}

function renderForm(subject, category) {
  return `
    <div class="form-card" id="form_${subject.key}_${category.key}">
      <div class="form-title">
        <iconify-icon icon="fluent:add-circle-24-regular" width="18"></iconify-icon>
        Add Exam Entry
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Total Marks</label>
          <input type="number" class="form-input" id="inp_total_${subject.key}_${category.key}" placeholder="e.g. 25" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Marks Obtained</label>
          <input type="number" class="form-input" id="inp_obtained_${subject.key}_${category.key}" placeholder="e.g. 20" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Exam Date</label>
          <input type="date" class="form-input" id="inp_date_${subject.key}_${category.key}">
        </div>
        <button class="btn btn-primary btn-add" onclick="addEntry('${subject.key}','${category.key}')">
          <iconify-icon icon="fluent:add-24-filled" width="14"></iconify-icon>
          Add
        </button>
      </div>
    </div>
  `;
}

function renderAnalysis(subject, category, data) {
  if (data.length < 2) {
    return `<div class="analysis-section" id="analysis_${subject.key}_${category.key}" style="display:none"></div>`;
  }

  const pcts = data.map(d => d.obtained / d.total * 100);
  const latest = pcts[pcts.length-1];
  const prev = pcts[pcts.length-2];
  const diff = latest - prev;
  const best = Math.max(...pcts);
  const worst = Math.min(...pcts);
  const avg = pcts.reduce((a,b)=>a+b,0)/pcts.length;

  const trendIcon = diff > 0
    ? `<iconify-icon icon="fluent:arrow-trending-up-24-filled" width="14" class="trend-up"></iconify-icon>`
    : diff < 0
    ? `<iconify-icon icon="fluent:arrow-trending-down-24-filled" width="14" class="trend-down"></iconify-icon>`
    : `<iconify-icon icon="fluent:arrow-trending-24-regular" width="14" class="trend-neutral"></iconify-icon>`;

  const rows = [
    { label: 'Performance Trend', value: `${trendIcon} ${diff >= 0 ? '+' : ''}${diff.toFixed(2)}% vs previous` },
    { label: 'Best Performance', value: `${best.toFixed(2)}% (Exam ${pcts.indexOf(best)+1})` },
    { label: 'Worst Performance', value: `${worst.toFixed(2)}% (Exam ${pcts.indexOf(worst)+1})` },
    { label: 'Average Performance', value: `${avg.toFixed(2)}%` },
    { label: 'Total Score', value: `${data.reduce((a,b)=>a+b.obtained,0)} / ${data.reduce((a,b)=>a+b.total,0)}` },
    { label: 'Consistency', value: consistencyLabel(pcts) },
  ];

  return `
    <div class="analysis-section" id="analysis_${subject.key}_${category.key}">
      <div class="section-header">
        <div class="section-title">
          <iconify-icon icon="fluent:data-scatter-24-regular" width="18"></iconify-icon>
          Performance Analysis
        </div>
      </div>
      ${rows.map(r => `
        <div class="analysis-row">
          <span class="analysis-label">${r.label}</span>
          <span class="analysis-value">${r.value}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function consistencyLabel(pcts) {
  if (pcts.length < 2) return 'N/A';
  const avg = pcts.reduce((a,b)=>a+b,0)/pcts.length;
  const variance = pcts.reduce((a,b)=>a+Math.pow(b-avg,2),0)/pcts.length;
  const std = Math.sqrt(variance);
  if (std < 5) return 'Very Consistent';
  if (std < 10) return 'Consistent';
  if (std < 18) return 'Moderate';
  return 'Inconsistent';
}

function renderChart(subject, category) {
  const opts = CHART_TYPES.map(t => `<option value="${t.value}">${t.label}</option>`).join('');
  return `
    <div class="chart-section" id="chartsection_${subject.key}_${category.key}">
      <div class="section-header">
        <div class="section-title">
          <iconify-icon icon="fluent:chart-multiple-24-regular" width="18"></iconify-icon>
          Performance Chart
        </div>
        <div class="chart-controls">
          <select class="chart-type-select" id="charttype_${subject.key}_${category.key}"
            onchange="rebuildChart('${subject.key}','${category.key}')">
            ${opts}
          </select>
          <button class="btn btn-ghost" style="padding:7px 12px;font-size:12px"
            onclick="resetChartZoom('${subject.key}','${category.key}')">
            <iconify-icon icon="fluent:zoom-fit-24-regular" width="14"></iconify-icon>
            Reset Zoom
          </button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chart_${subject.key}_${category.key}"></canvas>
      </div>
      <div class="chart-hint">Scroll or pinch to zoom — drag to pan</div>
    </div>
  `;
}

function renderTable(subject, category, data) {
  const rows = data.length === 0
    ? `<tr><td colspan="7">
        <div class="empty-state">
          <iconify-icon icon="fluent:document-add-24-regular"></iconify-icon>
          <p>No exam records yet.<br>Add your first entry above.</p>
        </div>
       </td></tr>`
    : data.map((d, i) => {
        const pct = d.obtained / d.total * 100;
        const prevPct = i > 0 ? data[i-1].obtained / data[i-1].total * 100 : null;
        const dir = prevPct === null ? 'neutral' : pct > prevPct ? 'up' : pct < prevPct ? 'down' : 'neutral';
        const badge = pct >= 80 ? 'high' : pct >= 50 ? 'mid' : 'low';
        return `<tr>
          <td><span class="exam-name">Exam ${d.examNo}</span></td>
          <td>${d.total}</td>
          <td>${d.obtained}</td>
          <td>${(d.total - d.obtained)}</td>
          <td><span class="pct-badge ${badge}">${pct.toFixed(1)}%</span></td>
          <td style="min-width:120px">
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill ${dir}" style="width:${pct}%"></div>
            </div>
            <div style="font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--font-mono)">
              ${dir === 'up' ? '+' + (pct-prevPct).toFixed(1) + '% vs prev' : dir === 'down' ? (pct-prevPct).toFixed(1) + '% vs prev' : 'first entry'}
            </div>
          </td>
          <td style="font-family:var(--font-mono);font-size:12px;color:var(--text3)">${d.date || '--'}</td>
          <td>
            <button class="btn btn-danger" style="padding:5px 10px;font-size:11px"
              onclick="removeEntry('${subject.key}','${category.key}','${d.id}')">
              <iconify-icon icon="fluent:delete-24-regular" width="13"></iconify-icon>
            </button>
          </td>
        </tr>`;
      }).join('');

  return `
    <div class="section-header">
      <div class="section-title">
        <iconify-icon icon="fluent:table-24-regular" width="18"></iconify-icon>
        Exam Records
        <span style="font-size:12px;font-family:var(--font-mono);color:var(--text3);font-weight:400">(${data.length} entries)</span>
      </div>
    </div>
    <div class="table-wrapper" id="table_${subject.key}_${category.key}">
      <table>
        <thead>
          <tr>
            <th>Exam</th><th>Total</th><th>Obtained</th><th>Missed</th>
            <th>Percentage</th><th>Progress</th><th>Date</th><th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ==================== EVENTS ====================
function initSubjectEvents(subject, category) {
  // Set default date
  const dateInp = document.getElementById(`inp_date_${subject}_${category}`);
  if (dateInp) dateInp.value = new Date().toISOString().split('T')[0];

  buildChart(subject, category);
}

function switchSubject(subject) {
  document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.subject-tab[data-subject="${subject}"]`).classList.add('active');
  document.querySelectorAll('.subject-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel_${subject}`).classList.add('active');

  // Init both categories for the subject
  for (const c of CATEGORIES) {
    initSubjectEvents(subject, c.key);
  }
}

function switchCategory(subject, category) {
  const container = document.getElementById(`catpanels_${subject}`);
  container.querySelectorAll('.category-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`catpanel_${subject}_${category}`).classList.add('active');

  const tabs = document.querySelectorAll(`.category-tab[data-subject="${subject}"]`);
  tabs.forEach(t => t.classList.remove('active'));
  document.querySelector(`.category-tab[data-subject="${subject}"][data-category="${category}"]`).classList.add('active');

  initSubjectEvents(subject, category);
}

// Subject tab clicks
document.getElementById('subjectTabs').addEventListener('click', e => {
  const tab = e.target.closest('.subject-tab');
  if (tab) switchSubject(tab.dataset.subject);
});

// ==================== CRUD ====================
async function addEntry(subject, category) {
  const totalInp = document.getElementById(`inp_total_${subject}_${category}`);
  const obtInp = document.getElementById(`inp_obtained_${subject}_${category}`);
  const dateInp = document.getElementById(`inp_date_${subject}_${category}`);

  const total = parseFloat(totalInp.value);
  const obtained = parseFloat(obtInp.value);
  const date = dateInp.value;

  if (!total || total <= 0) { toast('Enter a valid total marks', 'error'); return; }
  if (isNaN(obtained) || obtained < 0) { toast('Enter valid marks obtained', 'error'); return; }
  if (obtained > total) { toast('Obtained cannot exceed total marks', 'error'); return; }

  const data = getData(subject, category);
  const examNo = data.length + 1;
  const entry = { total, obtained, date, examNo, createdAt: Date.now() };

  const btn = document.querySelector(`#form_${subject}_${category} .btn-add`);
  const origHTML = btn.innerHTML;
  btn.innerHTML = '<span class="loader"></span>';
  btn.disabled = true;

  const id = await saveEntry(subject, category, entry);
  btn.innerHTML = origHTML;
  btn.disabled = false;

  if (id) {
    data.push({ id, ...entry });
    setData(subject, category, data);
    totalInp.value = '';
    obtInp.value = '';
    refreshPanel(subject, category);
    toast(`Exam ${examNo} added successfully`, 'success');
  }
}

async function removeEntry(subject, category, id) {
  if (!confirm('Delete this exam entry?')) return;
  const ok = await deleteEntry(subject, category, id);
  if (ok) {
    const data = getData(subject, category).filter(d => d.id !== id);
    // Re-number
    data.forEach((d, i) => d.examNo = i + 1);
    setData(subject, category, data);
    refreshPanel(subject, category);
    toast('Entry deleted', 'info');
  }
}

// ==================== REFRESH ====================
function refreshPanel(subject, category) {
  const panel = document.getElementById(`catpanel_${subject}_${category}`);
  if (!panel) return;
  const data = getData(subject, category);

  // Destroy existing chart
  const key = stateKey(subject, category);
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }

  panel.innerHTML = renderCategoryPanel(
    SUBJECTS.find(s => s.key === subject),
    CATEGORIES.find(c => c.key === category)
  );

  initSubjectEvents(subject, category);
}

// ==================== CHARTS ====================
function buildChart(subject, category) {
  const key = stateKey(subject, category);
  const canvas = document.getElementById(`chart_${subject}_${category}`);
  if (!canvas) return;
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }

  const data = getData(subject, category);
  const chartType = document.getElementById(`charttype_${subject}_${category}`)?.value || 'line';
  const subjectInfo = SUBJECTS.find(s => s.key === subject);
  const color = subjectInfo?.color || '#4f8ef7';

  if (data.length === 0) {
    // empty placeholder
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#2e3649';
    ctx.font = '14px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText('No data to display', canvas.width / 2, canvas.height / 2);
    return;
  }

  const labels = data.map(d => `Exam ${d.examNo}`);
  const pcts = data.map(d => parseFloat((d.obtained / d.total * 100).toFixed(2)));
  const obtained = data.map(d => d.obtained);
  const total = data.map(d => d.total);
  const dates = data.map(d => d.date || `Exam ${d.examNo}`);

  const makeColor = (hex, alpha) => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  };

  let cfg = {};

  if (chartType === 'line') {
    cfg = {
      type: 'line',
      data: { labels, datasets: [{
        label: 'Percentage %',
        data: pcts,
        borderColor: color,
        backgroundColor: makeColor(color, 0.08),
        tension: 0.4, fill: false, pointRadius: 5,
        pointBackgroundColor: color,
      }]}
    };
  } else if (chartType === 'area') {
    cfg = {
      type: 'line',
      data: { labels, datasets: [{
        label: 'Percentage %',
        data: pcts,
        borderColor: color,
        backgroundColor: makeColor(color, 0.2),
        tension: 0.4, fill: true, pointRadius: 5,
        pointBackgroundColor: color,
      }]}
    };
  } else if (chartType === 'bar') {
    cfg = {
      type: 'bar',
      data: { labels, datasets: [{
        label: 'Percentage %',
        data: pcts,
        backgroundColor: pcts.map(p => makeColor(p >= 80 ? '#22c55e' : p >= 50 ? '#eab308' : '#ef4444', 0.7)),
        borderColor: pcts.map(p => p >= 80 ? '#22c55e' : p >= 50 ? '#eab308' : '#ef4444'),
        borderWidth: 1, borderRadius: 4,
      }]}
    };
  } else if (chartType === 'stackedBar') {
    cfg = {
      type: 'bar',
      data: { labels, datasets: [
        { label: 'Obtained', data: obtained, backgroundColor: makeColor(color, 0.7), borderRadius: 4 },
        { label: 'Missed', data: data.map(d => d.total - d.obtained), backgroundColor: makeColor('#ef4444', 0.4), borderRadius: 4 },
      ]},
      options: { scales: { x: { stacked: true }, y: { stacked: true } } }
    };
  } else if (chartType === 'pie') {
    cfg = {
      type: 'pie',
      data: { labels, datasets: [{
        data: pcts,
        backgroundColor: labels.map((_, i) => `hsl(${(i * 360/labels.length) + 200},70%,55%)`),
        borderWidth: 2, borderColor: '#10131a',
      }]}
    };
  } else if (chartType === 'doughnut') {
    cfg = {
      type: 'doughnut',
      data: { labels, datasets: [{
        data: pcts,
        backgroundColor: labels.map((_, i) => `hsl(${(i * 360/labels.length) + 200},65%,55%)`),
        borderWidth: 2, borderColor: '#10131a',
        cutout: '60%',
      }]}
    };
  } else if (chartType === 'radar') {
    cfg = {
      type: 'radar',
      data: { labels, datasets: [{
        label: 'Percentage %',
        data: pcts,
        backgroundColor: makeColor(color, 0.2),
        borderColor: color,
        pointBackgroundColor: color,
        pointRadius: 4,
      }]},
      options: { scales: { r: { min: 0, max: 100, ticks: { color: '#5a6480' }, grid: { color: '#252c3d' }, pointLabels: { color: '#8b96b0', font: { size: 11 } } } } }
    };
  } else if (chartType === 'scatter') {
    cfg = {
      type: 'scatter',
      data: { datasets: [{
        label: 'Exam vs Percentage',
        data: data.map(d => ({ x: d.examNo, y: parseFloat((d.obtained/d.total*100).toFixed(2)) })),
        backgroundColor: makeColor(color, 0.7),
        pointRadius: 7,
      }]},
      options: { scales: { x: { title: { display: true, text: 'Exam No', color: '#8b96b0' } }, y: { title: { display: true, text: 'Percentage', color: '#8b96b0' } } } }
    };
  } else if (chartType === 'bubble') {
    cfg = {
      type: 'bubble',
      data: { datasets: [{
        label: 'Marks',
        data: data.map(d => ({ x: d.examNo, y: parseFloat((d.obtained/d.total*100).toFixed(2)), r: Math.max(5, d.obtained/d.total*20) })),
        backgroundColor: makeColor(color, 0.55),
        borderColor: color,
      }]},
      options: { scales: { x: { title: { display: true, text: 'Exam No', color: '#8b96b0' } }, y: { title: { display: true, text: 'Percentage', color: '#8b96b0' } } } }
    };
  } else if (chartType === 'mixed') {
    cfg = {
      type: 'bar',
      data: { labels, datasets: [
        { type: 'bar', label: 'Obtained', data: obtained, backgroundColor: makeColor(color, 0.5), borderRadius: 4, yAxisID: 'y' },
        { type: 'line', label: 'Percentage %', data: pcts, borderColor: '#eab308', tension: 0.4, fill: false, pointRadius: 4, pointBackgroundColor: '#eab308', yAxisID: 'y2' },
      ]},
      options: { scales: { y: { position: 'left' }, y2: { position: 'right', grid: { drawOnChartArea: false }, max: 100 } } }
    };
  }

  // Base options
  const baseOptions = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 600 },
    plugins: {
      legend: { labels: { color: '#8b96b0', font: { family: 'DM Sans', size: 12 }, padding: 20 } },
      tooltip: {
        backgroundColor: '#161923',
        borderColor: '#252c3d',
        borderWidth: 1,
        titleColor: '#e8ecf4',
        bodyColor: '#8b96b0',
        padding: 10,
        callbacks: {
          label: ctx => {
            if (chartType === 'bubble' || chartType === 'scatter') return ` ${ctx.parsed.y.toFixed(1)}%`;
            return ` ${typeof ctx.parsed.y === 'number' ? ctx.parsed.y.toFixed(1) : ctx.raw}${chartType !== 'stackedBar' && chartType !== 'mixed' && ctx.dataset.label === 'Percentage %' ? '%' : ''}`;
          }
        }
      },
      zoom: {
        zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' },
        pan: { enabled: true, mode: 'xy' }
      }
    },
    scales: {
      x: { ticks: { color: '#5a6480', font: { family: 'DM Mono', size: 11 } }, grid: { color: '#1c2130' } },
      y: { ticks: { color: '#5a6480', font: { family: 'DM Mono', size: 11 } }, grid: { color: '#1c2130' } },
      ...(cfg.options?.scales || {})
    }
  };

  // Merge
  if (!cfg.options) cfg.options = {};
  cfg.options = deepMerge(baseOptions, cfg.options);
  if (cfg.type === 'pie' || cfg.type === 'doughnut' || cfg.type === 'radar') {
    delete cfg.options.scales;
  }

  try {
    const ctx = canvas.getContext('2d');
    charts[key] = new Chart(ctx, cfg);
  } catch(e) {
    console.error('Chart error:', e);
  }
}

function rebuildChart(subject, category) {
  const key = stateKey(subject, category);
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
  buildChart(subject, category);
}

function resetChartZoom(subject, category) {
  const key = stateKey(subject, category);
  if (charts[key]) charts[key].resetZoom();
}

function deepMerge(target, source) {
  const out = Object.assign({}, target);
  for (const k in source) {
    if (source[k] && typeof source[k] === 'object' && !Array.isArray(source[k])) {
      out[k] = deepMerge(target[k] || {}, source[k]);
    } else {
      out[k] = source[k];
    }
  }
  return out;
}

// ==================== PWA ====================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});

document.getElementById('installBtn')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBanner').style.display = 'none';
    toast('App installed successfully', 'success');
  }
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
  toast('ExamTrack installed', 'success');
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Handle firebase not loading
setTimeout(() => {
  if (!window._db) {
    document.getElementById('statusLabel').textContent = 'Offline';
    toast('Firebase connection failed. Check your internet.', 'error');
  }
}, 8000);
</script>
